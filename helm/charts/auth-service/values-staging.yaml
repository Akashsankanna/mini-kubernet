# Staging environment values
replicaCount: 2

image:
  tag: "staging"

resources:
  limits:
    cpu: 400m
    memory: 384Mi
  requests:
    cpu: 200m
    memory: 192Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

database:
  host: postgres-staging.kubernet-staging.svc.cluster.local

redis:
  host: redis-staging.kubernet-staging.svc.cluster.local

ingress:
  hosts:
    - host: auth-staging.mini-kubernet.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: auth-service-staging-tls
      hosts:
        - auth-staging.mini-kubernet.com
