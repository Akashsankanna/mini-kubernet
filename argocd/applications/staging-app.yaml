apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mini-kubernet-staging
  namespace: argocd
spec:
  project: mini-kubernet
  source:
    repoURL: 'https://github.com/mini-kubernet/mini-kubernet.git'
    targetRevision: staging
    path: argocd/applications/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: kubernet-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
