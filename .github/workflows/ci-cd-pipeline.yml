name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  APP_NAME: mini-kubernet

jobs:
  # ==========================================
  # CODE QUALITY & SECURITY SCANNING
  # ==========================================
  
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # BUILD & TEST
  # ==========================================

  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      matrix:
        service: [auth-service, api-gateway, build-service, deploy-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run Go tests - ${{ matrix.service }}
        run: |
          cd backend/${{ matrix.service }}
          go test -v -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
          fail_ci_if_error: true

      - name: Run Go linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: backend/${{ matrix.service }}

      - name: Build binary
        run: |
          cd backend/${{ matrix.service }}
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/${{ matrix.service }} .

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run linter
        run: cd frontend && npm run lint

      - name: Run tests
        run: cd frontend && npm test -- --coverage

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/coverage
          flags: frontend
          fail_ci_if_error: true

  # ==========================================
  # KUBERNETES VALIDATION
  # ==========================================

  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin

      - name: Validate Kubernetes manifests
        run: |
          kubeval k8s/**/*.yaml --ignore-missing-schemas

      - name: Install Kube-score
        run: |
          wget https://github.com/zegl/kube-score/releases/latest/download/kube-score_linux_amd64
          chmod +x kube-score_linux_amd64
          sudo mv kube-score_linux_amd64 /usr/local/bin/kube-score

      - name: Score Kubernetes manifests
        run: |
          kube-score score k8s/**/*.yaml --ignore-test pod-networkpolicy

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Helm lint and validation
        run: |
          for chart in helm/charts/*/; do
            helm lint "$chart"
            helm template "$chart"
          done

  # ==========================================
  # DOCKER BUILD & SCAN
  # ==========================================

  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, validate-k8s]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [auth-service, api-gateway, build-service, deploy-service, frontend]
        include:
          - service: auth-service
            dockerfile: backend/auth-service/Dockerfile
            context: backend/auth-service
          - service: api-gateway
            dockerfile: backend/api-gateway/Dockerfile
            context: backend/api-gateway
          - service: build-service
            dockerfile: backend/build-service/Dockerfile
            context: backend/build-service
          - service: deploy-service
            dockerfile: backend/deploy-service/Dockerfile
            context: backend/deploy-service
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          dockerfile: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          outputs: type=docker,dest=/tmp/${{ matrix.service }}.tar

      - name: Load Docker image
        run: docker load --input /tmp/${{ matrix.service }}.tar

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service }}-results.sarif'

      - name: Push image to ECR
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          dockerfile: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.service }}:buildcache,mode=max

      - name: Image scan results
        run: echo "Image ${{ matrix.service }}:${{ github.sha }} pushed successfully"

  # ==========================================
  # TERRAFORM VALIDATION
  # ==========================================

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Validation
        run: |
          for env in dev staging prod; do
            cd terraform/environments/$env
            terraform init -backend=false
            terraform validate
            cd ../../..
          done

      - name: TFLint
        uses: terraform-linters/setup-tflint@v3

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive terraform/

      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: reports/checkov.sarif

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: reports/checkov.sarif

  # ==========================================
  # DEPLOYMENT TO DEV
  # ==========================================

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.mini-kubernet.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name mini-kubernet-dev --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Add Helm repositories
        run: |
          helm repo add stable https://charts.helm.sh/stable
          helm repo update

      - name: Deploy with Helm
        run: |
          for service in auth-service api-gateway build-service deploy-service frontend; do
            helm upgrade --install $service helm/charts/$service \
              -f helm/charts/$service/values-dev.yaml \
              --namespace kubernet-dev \
              --create-namespace
          done

      - name: Wait for rollout
        run: kubectl rollout status deployment -n kubernet-dev --timeout=5m

      - name: Run smoke tests
        run: bash scripts/tests/smoke-tests-dev.sh

  # ==========================================
  # DEPLOYMENT TO STAGING
  # ==========================================

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.mini-kubernet.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name mini-kubernet-staging --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy with Helm
        run: |
          for service in auth-service api-gateway build-service deploy-service frontend; do
            helm upgrade --install $service helm/charts/$service \
              -f helm/charts/$service/values-staging.yaml \
              --namespace kubernet-staging \
              --create-namespace
          done

      - name: Wait for rollout
        run: kubectl rollout status deployment -n kubernet-staging --timeout=5m

  # ==========================================
  # DEPLOYMENT TO PRODUCTION (ARGOCD)
  # ==========================================

  deploy-production:
    name: Deploy to Production with ArgoCD
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://mini-kubernet.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name mini-kubernet-prod --region ${{ env.AWS_REGION }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure

      - name: Create ArgoCD Application
        run: |
          argocd app create mini-kubernet-prod \
            --repo ${{ github.server_url }}/${{ github.repository }}.git \
            --path argocd/applications \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace kubernet-prod \
            --auto-prune \
            --self-heal || true

      - name: Sync ArgoCD Application
        run: |
          argocd app sync mini-kubernet-prod --force

      - name: Wait for sync
        run: |
          argocd app wait mini-kubernet-prod --timeout 300

      - name: Verify deployment
        run: bash scripts/tests/smoke-tests-prod.sh

  # ==========================================
  # NOTIFICATIONS
  # ==========================================

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deployment Status: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Mini Kubernet Deployment\nStatus: *${{ job.status }}*\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
