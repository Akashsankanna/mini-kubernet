apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
data:
  vault.hcl: |
    ui = true
    
    listener "tcp" {
      address       = "0.0.0.0:8200"
      tls_disable   = 0
      tls_cert_file = "/vault/config/cert.pem"
      tls_key_file  = "/vault/config/key.pem"
    }
    
    storage "file" {
      path = "/vault/file"
    }
    
    seal "awskms" {
      region     = "us-east-1"
      kms_key_id = "arn:aws:kms:us-east-1:ACCOUNT_ID:key/KEY_ID"
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-policies
  namespace: vault
data:
  auth-service-policy.hcl: |
    # Allow auth-service to read database credentials
    path "secret/data/mini-kubernet/auth-service/*" {
      capabilities = ["read", "list"]
    }
    
    # Allow auth-service to read JWT secret
    path "secret/data/mini-kubernet/jwt/*" {
      capabilities = ["read"]
    }
    
    # Allow auth-service to read database connection string
    path "database/static-creds/auth-service" {
      capabilities = ["read"]
    }
    
    # Allow renewal of tokens
    path "auth/token/renew-self" {
      capabilities = ["update"]
    }
  
  kubernetes-auth-policy.hcl: |
    # Allow Kubernetes to authenticate
    path "auth/kubernetes" {
      capabilities = ["read"]
    }
    
    path "sys/auth/kubernetes" {
      capabilities = ["read", "list"]
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vault
spec:
  serviceName: vault
  replicas: 3
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault
      containers:
      - name: vault
        image: vault:latest
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
        ports:
        - containerPort: 8200
          name: http
        env:
        - name: VAULT_API_ADDR
          value: "https://vault.vault.svc.cluster.local:8200"
        - name: VAULT_CLUSTER_ADDR
          value: "https://127.0.0.1:8201"
        volumeMounts:
        - name: config
          mountPath: /vault/config
        - name: data
          mountPath: /vault/file
        args:
        - server
        - -config=/vault/config/vault.hcl
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: vault-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
spec:
  clusterIP: None
  selector:
    app: vault
  ports:
  - port: 8200
    name: http
