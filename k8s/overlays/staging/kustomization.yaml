apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubernet-staging

commonLabels:
  app: mini-kubernet
  environment: staging

commonAnnotations:
  managed-by: kustomize

replicas:
- name: auth-service
  count: 2
- name: api-gateway
  count: 2
- name: build-service
  count: 1
- name: deploy-service
  count: 1

resources:
- ../../base/
- ../../../k8s/security/staging-namespace.yaml

patchesJson6902:
- target:
    group: apps
    version: v1
    kind: Deployment
  patch: |-
    - op: add
      path: /spec/template/spec/affinity
      value:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - mini-kubernet
            topologyKey: kubernetes.io/hostname
