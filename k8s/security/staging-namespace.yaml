apiVersion: v1
kind: Namespace
metadata:
  name: kubernet-staging
  labels:
    name: kubernet
    environment: staging
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: kubernet-staging-quota
  namespace: kubernet-staging
spec:
  hard:
    requests.cpu: "50"
    requests.memory: "100Gi"
    limits.cpu: "100"
    limits.memory: "200Gi"
    pods: "250"
    services: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: kubernet-staging-limits
  namespace: kubernet-staging
spec:
  limits:
  - max:
      cpu: "1"
      memory: "1Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "250m"
      memory: "256Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    type: Pod
