apiVersion: v1
kind: Namespace
metadata:
  name: kubernet-dev
  labels:
    name: kubernet
    environment: dev
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: kubernet-dev-quota
  namespace: kubernet-dev
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    pods: "100"
    services: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: kubernet-dev-limits
  namespace: kubernet-dev
spec:
  limits:
  - max:
      cpu: "500m"
      memory: "512Mi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "100m"
      memory: "128Mi"
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
    type: Container
  - max:
      cpu: "1"
      memory: "1Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Pod
