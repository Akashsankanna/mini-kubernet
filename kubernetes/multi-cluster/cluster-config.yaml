apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-cluster-config
  namespace: kubernet-prod
data:
  clusters.json: |
    {
      "clusters": [
        {
          "name": "us-east-1",
          "region": "us-east-1",
          "context": "gke_project_us-east-1-a_cluster-us-east-1"
        },
        {
          "name": "us-west-2",
          "region": "us-west-2",
          "context": "gke_project_us-west-2-a_cluster-us-west-2"
        },
        {
          "name": "eu-west-1",
          "region": "eu-west-1",
          "context": "gke_project_eu-west-1-b_cluster-eu-west-1"
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-global
  namespace: kubernet-prod
spec:
  type: ExternalName
  externalName: api-gateway.kubernet-prod.svc.cluster.local
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
